<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<body>

<div layout:fragment="content" class="container mt-4">

    <h2>Edit Product</h2>

    <form th:action="@{/products/edit}"
          th:object="${product}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Price</label>
            <input type="number" th:field="*{price}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label>Category</label>
            <select name="category.id" class="form-control">
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:text="${c.name}"
                        th:selected="${product.category != null and c.id == product.category.id}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label>Current Image</label><br>
            <img th:if="${product.image != null}"
                 th:src="@{'/images/' + ${product.image}}"
                 width="150">
        </div>

        <div class="mb-3">
            <label>New Image</label>
            <input type="file" name="imageProduct" class="form-control"/>
        </div>

        <button type="submit" class="btn btn-primary">Update</button>
        <a th:href="@{/products}" class="btn btn-secondary">Back</a>

    </form>

</div>

</body>
</html>
